<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crochet Stitch Translator</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: monospace;
            resize: vertical;
        }
        .output-box {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            border: 1px solid #e9ecef;
            min-height: 150px;
            font-family: monospace;
        }
        .controls {
            margin-bottom: 20px;
            background: #eef2f5;
            padding: 15px;
            border-radius: 5px;
        }
        button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>

    <h1>Crochet Stitch Translator</h1>
    <p>Paste your pattern below and select the conversion direction to safely translate terms.</p>

    <div class="controls">
        <label>
            <input type="radio" name="direction" value="ukToUs" checked> <strong>UK to US</strong>
        </label>
        <label style="margin-left: 20px;">
            <input type="radio" name="direction" value="usToUk"> <strong>US to UK</strong>
        </label>
    </div>

    <textarea id="inputPattern" placeholder="Paste your pattern text here..."></textarea>
    
    <button onclick="translatePattern()">Translate Pattern</button>

    <h3>Translated Result:</h3>
    <div id="outputPattern" class="output-box">Your translated pattern will appear here...</div>

    <script>
        // Dictionary format: [US Term, UK Term]
        // Longer phrases are listed first to prevent partial word matches.
        const stitchDictionary = [
            // Full Phrases
            ["yarn over", "yarn round hook"],
            ["half treble crochet", "half double treble crochet"],
            ["half double crochet", "half treble crochet"],
            ["double treble crochet", "triple treble crochet"],
            ["treble crochet", "double treble crochet"],
            ["double crochet", "treble crochet"],
            ["single crochet", "double crochet"],
            ["half treble", "half double treble"],
            ["half double", "half treble"],
            ["double treble", "triple treble"],
            ["slip stitch", "slip stitch"],
            
            // Abbreviations
            ["htr", "hdtr"],
            ["hdc", "htr"],
            ["dtr", "trtr"],
            ["tr", "dtr"],
            ["dc", "tr"],
            ["sc", "dc"],
            ["yo", "yrh"],
            ["sl st", "ss"]
        ];

        function translatePattern() {
            let text = document.getElementById("inputPattern").value;
            const direction = document.querySelector('input[name="direction"]:checked').value;
            
            // PASS 1: Find terms and replace them with a temporary placeholder.
            // This stops translated words from being re-translated in the same run.
            stitchDictionary.forEach((pair, index) => {
                let searchFor = direction === "usToUk" ? pair[0] : pair[1];
                let temporaryPlaceholder = `__PLACEHOLDER_${index}__`;

                // The (?<=\b|\d) ensures we catch stitches next to numbers, like "2dc" or "15tr"
                const regex = new RegExp("(?<=\\b|\\d)" + searchFor + "\\b", "gi");
                text = text.replace(regex, temporaryPlaceholder);
            });

            // PASS 2: Swap the placeholders for the final translated words.
            stitchDictionary.forEach((pair, index) => {
                let replaceWith = direction === "usToUk" ? pair[1] : pair[0];
                const regex = new RegExp(`__PLACEHOLDER_${index}__`, "g");
                text = text.replace(regex, replaceWith);
            });

            document.getElementById("outputPattern").innerText = text;
        }
    </script>

</body>
</html>
